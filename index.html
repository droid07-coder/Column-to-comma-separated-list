<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Column to Comma-Separated List</title>
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #111;
            color: #fff;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('./sickkids_hospital.jpg') center center / cover no-repeat;
            z-index: -1;
            filter: brightness(0.5);
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
            text-align: center;
        }

        .box {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(8px);
            width: 100%;
            max-width: 400px;
            padding: 25px;
            flex: 1 1 40%;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(255, 255, 255, 0.2); /* Light background that matches readability */
            color: #e3f0fc; /* Soft white-blue color for text */
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            font-size: 1em;
            margin-top: 10px;
            margin-bottom: 20px;
            resize: none;
            font-family: 'Poppins', sans-serif;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        button {
            padding: 12px 20px;
            background: #0099ff; /* Bright blue */
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: bold;
            transition: background 0.3s ease-in-out, transform 0.2s;
        }

        button:hover {
            background: #007acc;
            transform: translateY(-2px); /* Elevated hover effect */
        }

        button:active {
            background: #005f99;
            transform: scale(0.98);
        }

        h2 {
            margin-bottom: 10px;
            color: #eef5fc;
        }

        .message {
            font-size: 1em;
            font-weight: bold;
            color: #ffdd91; /* Soft yellow for the confirmation message */
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="background"></div>

    <!-- Main Content -->
    <div class="container">
        <div class="box">
            <h2>Input Column Data</h2>
            <textarea id="columnInput" placeholder="Enter column data..."></textarea>
            <button onclick="convertToCommaSeparated()">Convert</button>
            <p class="message" id="copyMessage"></p>
        </div>
        <div class="box">
            <h2>Comma-Separated List</h2>
            <textarea id="commaSeparatedOutput" readonly placeholder="Conversion result..."></textarea>
        </div>
    </div>

    <script>
        function convertToCommaSeparated() {
            const input = document.getElementById('columnInput').value;
            const rows = input.split('\n').map(row => row.trim()).filter(row => row);
            const result = rows.join(',');

            const outputField = document.getElementById('commaSeparatedOutput');
            outputField.value = result;

            // Automatically copy to clipboard
            outputField.select();
            document.execCommand('copy');

            // Show confirmation message
            const copyMessage = document.getElementById('copyMessage');
            copyMessage.textContent = 'Comma-separated list copied to clipboard!';
            setTimeout(() => { copyMessage.textContent = ''; }, 3000);
        }
    </script>
</body>
</html>
